<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arraçoamento</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:15px;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.card{
    max-width:600px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:15px;
}

.info{
    background:#1b1b1b;
    border-radius:12px;
    padding:12px;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
}

.dia{
    background:#222;
    border-radius:12px;
    padding:16px;
    margin-bottom:12px;
}

.hoje{
    background:#1f4f2b;
    border:2px solid #4CAF50;
}

.amanha{
    background:#183a58;
    border:2px solid #3498db;
}

.editavel{
    background:#5c3b00;
    border:2px solid #ff9800;
}

.data{
    font-size:18px;
    font-weight:bold;
    margin-bottom:6px;
}

.refeicoes{
    color:#ffffff;
    font-size:20px;
    font-weight:700;
    line-height:1.4;
    margin-top:8px;
    padding:10px;
    background:#2a2a2a;
    border-radius:10px;
}

.status{
    text-align:center;
    padding:20px;
}

.label{
    font-size:12px;
    font-weight:bold;
    margin-bottom:5px;
    color:#bbb;
}

.formulario{
    color:#c084fc;
}

</style>
</head>
<body>

<div class="card">

    <h1>🍽 Arraçoamento</h1>

    <div id="statusFormulario" class="info">
        Carregando...
    </div>

    <div id="conteudo" class="status">
        Carregando...
    </div>

</div>

<script>

const EMAIL = "arthurnvs2002@gmail.com";

const API =
"https://sheets.googleapis.com/v4/spreadsheets/1PYjqUUIlQfsPuQTO8TTPj9MbUNprKsp71bUbLvyVx9o/values/CheckArra%C3%A7oamentoPrata?key=AIzaSyCf23te5v6gvL4WDShqCpMWB6r3ySE-i9s";

const diasSemana = [
    "DOM",
    "SEG",
    "TER",
    "QUA",
    "QUI",
    "SEX",
    "SÁB"
];

function obterData(dataStr){

    const [dia, mes, ano] = dataStr.split("/");

    return new Date(
        Number(ano),
        Number(mes) - 1,
        Number(dia)
    );
}

function atualizarStatusFormulario(){

    const hoje = new Date();

    const diaSemana = hoje.getDay();

    let texto = "";

    if(
        diaSemana === 4 ||
        diaSemana === 5 ||
        diaSemana === 6 ||
        diaSemana === 0 ||
        diaSemana === 1
    ){
        texto = "📋 FORMULÁRIO ABERTO";
    }
    else{

        const diasAteQuinta =
            diaSemana === 2 ? 2 :
            diaSemana === 3 ? 1 : 0;

        texto =
            `📋 Próximo arraçoamento abre em ${diasAteQuinta} dia(s)`;
    }

    document.getElementById("statusFormulario").innerHTML = texto;
}

async function carregar(){

    try{

        atualizarStatusFormulario();

        const resposta = await fetch(API);
        const json = await resposta.json();

        const linhas = json.values || [];

        const minhasLinhas =
            linhas.filter(l => l[1] === EMAIL);

        const hoje = new Date();

        const hojeStr =
            String(hoje.getDate()).padStart(2,'0') + "/" +
            String(hoje.getMonth()+1).padStart(2,'0') + "/" +
            hoje.getFullYear();

        let linhaValida = null;
        let indiceHoje = -1;

        for(const linha of minhasLinhas){

            const datas = linha.slice(10,17);

            const idx = datas.indexOf(hojeStr);

            if(idx !== -1){

                linhaValida = linha;
                indiceHoje = idx;
                break;
            }
        }

        if(!linhaValida){

            document.getElementById("conteudo").innerHTML =
                "Nenhum arraçoamento encontrado para hoje.";

            return;
        }

        const datas = linhaValida.slice(10,17);
        const refeicoes = linhaValida.slice(3,10);

        let html = "";

        for(let i = indiceHoje; i < datas.length; i++){

            const dataObj = obterData(datas[i]);

            const nomeDia =
                diasSemana[dataObj.getDay()];

            let classe = "";
            let titulo = "";

            if(i === indiceHoje){

                classe = "hoje";
                titulo = "🟢 HOJE";

            }
            else if(i === indiceHoje + 1){

                classe = "amanha";
                titulo = "🔵 AMANHÃ";

            }
            else if(i <= indiceHoje + 3){

                classe = "editavel";
                titulo = "🟠 EDITÁVEL";
            }

            const ehQuinta =
                dataObj.getDay() === 4;

            html += `
                <div class="dia ${classe}">

                    ${
                        titulo
                        ? `<div class="label">${titulo}</div>`
                        : ""
                    }

                    ${
                        ehQuinta
                        ? `<div class="label formulario">📋 ABRE ARRAÇOAMENTO</div>`
                        : ""
                    }

                    <div class="data">
                        ${nomeDia} • ${datas[i]}
                    </div>

                    <div class="refeicoes">
                        ${refeicoes[i]}
                    </div>

                </div>
            `;
        }

        document.getElementById("conteudo").innerHTML = html;

    }
    catch(erro){

        console.error(erro);

        document.getElementById("conteudo").innerHTML =
            "Erro ao carregar dados.";
    }

}

carregar();

</script>

</body>
</html>
